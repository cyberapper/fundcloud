repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        # mkdocs.yml uses python-name tags (material.extensions.emoji.twemoji,
        # pymdownx.superfences.fence_code_format) that the safe loader can't
        # construct. --unsafe lets the loader skip those constructors.
        args: ["--unsafe"]
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=200"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: clippy
        args: ["--workspace", "--", "-D", "warnings"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy
        args: [python/fundcloud]
        pass_filenames: false
        types: [python]
      - id: cargo-test
        name: cargo test
        language: system
        entry: cargo
        args: [test, --workspace, --no-fail-fast]
        pass_filenames: false
        stages: [manual]
