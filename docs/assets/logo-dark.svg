<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" role="img" aria-label="Fundcloud">
  <defs>
    <linearGradient id="fc-accent-dark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#4D8CD9"/>
    </linearGradient>
  </defs>
  <!-- Monogram: white-tinted square with navy F (inverted for dark theme) -->
  <rect x="2" y="8" width="32" height="32" rx="7" fill="#f5f5f5"/>
  <text x="18" y="30" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="19" font-weight="700" fill="#003a70" letter-spacing="-0.02em">F</text>
  <!-- Wordmark: 'Fund' in off-white, 'cloud' in gradient -->
  <text x="46" y="31"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="600" letter-spacing="-0.02em">
    <tspan fill="#f5f5f5">Fund</tspan><tspan fill="url(#fc-accent-dark)">cloud</tspan>
  </text>
</svg>
