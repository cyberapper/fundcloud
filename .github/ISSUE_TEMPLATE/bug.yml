name: Bug report
description: Something is broken or behaves unexpectedly
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Fundcloud version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Shortest snippet that reproduces the issue
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Full traceback (if any)
      render: shell
