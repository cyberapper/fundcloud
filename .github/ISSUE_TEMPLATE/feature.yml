name: Feature request
description: Propose a new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / design sketch
      description: Sketch the API or link to a related issue.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
